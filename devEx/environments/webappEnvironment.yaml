# yaml-language-server: $schema=https://github.com/Azure/deployment-environments/releases/download/2022-11-11-preview/manifest.schema.json
name: WebApp
version: 1.0.0
summary: Azure Web App Environment
description: Deploys an Azure Web App without a data store
runner: ARM
templatePath: deploy.json

parameters:
  - id: workloadName
    name: workloadName
    description: 'Workload name'
    type: string
    required: true
  - id: devBoxResourceGroupName
    name: devBoxResourceGroupName
    description: 'devBoxResourceGroupName name'
    type: string
    required: true
  - id: connectivityResourceGroupName
    name: connectivityResourceGroupName
    description: 'connectivityResourceGroupName name'
    type: string
    required: true